name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-test-package:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Install (dist)
        run: cmake --install build --config Release --prefix dist

      - name: Package (zip)
        run: cmake -E chdir dist cmake -E tar cf "../loxseq-${{ github.ref_name }}-${{ matrix.os }}.zip" --format=zip .

      - uses: actions/upload-artifact@v4
        with:
          name: loxseq-${{ github.ref_name }}-${{ matrix.os }}
          path: "*.zip"

  publish:
    needs: build-test-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
